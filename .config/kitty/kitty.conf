shell zsh
# Font.
#font_family      JetBrainsMono NF Medium
#italic_font      JetBrainsMono NF Medium Italic
font_family      JetBrainsMono NF
italic_font      JetBrainsMono NF Italic
bold_font        JetBrainsMono NF Bold
bold_italic_font JetBrainsMono NF Bold Italic
font_size 12

modify_font underline_position 12
modify_font undercurl_position 12
undercurl_style thin-sparse

# Cursor.
cursor_blink_interval 0.5
#theme
include themes/rose-pine.conf
# include themes/nordic.conf

#window_padding_width 10
#background_opacity 0.60
hide_window_decorations yes
confirm_os_window_close 0


# BEGIN_KITTY_THEME
# Catppuccin-Mocha
#include current-theme.conf
# END_KITTY_THEME
