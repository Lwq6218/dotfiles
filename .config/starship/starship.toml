palette = "catppuccin_mocha"
add_newline = false
"$schema" = "https://starship.rs/config-schema.json"

format = """
$directory\
${custom.git_url}\
${custom.git_host}\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
$hg_branch\
\n$os\
$character
"""

right_format = "$cmd_duration"

[fill]
symbol = " "

[os]
format = "[$symbol]($style)"
style = "bold blue"
disabled = false

[character]
success_symbol = "[пҒЎ](green)"
error_symbol = "[пҒЎ](red)"
vicmd_symbol = "[пҒ ](green)"

[directory]
style = "bold blue"
read_only = "пҖЈ "
truncation_length = 4
truncate_to_repo = false
truncation_symbol = "вҖҰ/"
use_os_path_sep = false

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Trash" = "у°©№ "
"Desktop" = "у°ў№ "
"Videos" = "пҖҪ "
"Templates" = "п”ү "
".config" = "оһҷ"
".cache" = "у°ғЁ "
"home" = "п”Қ "
"~" = "пҖ• ~"

[hg_branch]
style = 'green'

[git_branch]
symbol = 'пҗҳ '
style = 'green'

[git_commit]
commit_hash_length = 8
tag_disabled = false
tag_symbol = ' пҖ« '
style = 'peach'

[git_state]
style = 'peach'
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_metrics]
added_style = 'peach'
deleted_style = 'peach'
disabled = false

[git_status]
format = '([$all_status$ahead_behind]($style))'
style = 'green'
ahead = 'вҮЎ${count} '
behind = 'вҮЈ${count} '
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count} '
conflicted = '!! '
modified = '[!${count}](yellow) '
deleted = '[Г—${count}](red) '
staged = '[+${count}](lavender) '
untracked = '[?${count}](blue) '
renamed = '[В»${count}](pink) '
stashed = '*${count} '

[cmd_duration]
format = '[ п®« $duration]($style)'
style = 'yellow'
min_time = 2000

[custom.git_host]
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="пҗҲ "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="пҠ– "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="п…ұ "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="оңӮ "
else
    GIT_REMOTE_SYMBOL="пҮ’ "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
format = "at $output  "

[status]
style = 'yellow'


